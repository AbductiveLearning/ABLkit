name: flake8 Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  flake8-lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - name: Check out source repository
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: flake8 Lint
        uses: py-actions/flake8@v2
        with:
          path: ablkit
          max-line-length: "100"
          args: --ignore=E203,W503,F821
